<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DocuGen Pro — chat-driven AI document studio. Generate up to 200-page documents, switch themes, add citations, and export to PDF, DOCX, or PPTX." />
    <title>DocuGen Pro — AI Document Studio</title>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error([error.err.message, error.err.frame].filter(Boolean).join('\n'))
          }
        })
      }
    </script>

    <script type="module" src="/src/main.tsx"></script>
